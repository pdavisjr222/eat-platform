[build]
builder = "NIXPACKS"
buildCommand = "npm install && npx turbo run build --filter=./packages/shared --filter=./packages/server"

[deploy]
startCommand = "cd packages/server && NODE_ENV=production node dist/index.js"
healthcheckPath = "/api/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
